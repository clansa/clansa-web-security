<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link href="https://fonts.googleapis.com/css2?family=Intel+One+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src='main.js'></script>
</head>
<body>
<section class="homepage-overall">
    <div id="header"></div>
    <div id="hero"></div>
    <div id="stats"></div>
    <div id="pricing"></div>
    <div id="whatsinside"></div>
    <div id="testimonials"></div>
    <div id="footer"></div>
</section>


<script>
    async function loadSection(id, file) {
        const res = await fetch(file);
        const html = await res.text();
        document.getElementById(id).innerHTML = html;
    }

    loadSection('header', 'header.html');
    loadSection('hero', 'hero.html');
    loadSection('stats', 'stats.html');
    loadSection('pricing', 'pricing.html');
    loadSection('whatsinside', 'whatsinside.html');
    loadSection('testimonials', 'testimonials.html');
    loadSection('footer', 'footer.html');
</script>


</body>
</html>
